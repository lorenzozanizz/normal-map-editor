<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heightmap Editor</title>
    <!-- Add the four style sheets, window.css focuses more on the main window -->
    <link rel="stylesheet" href="style/heightmap.css">
    <link rel="stylesheet" href="style/preview.css">
    <link rel="stylesheet" href="style/viewer.css">
    <link rel="stylesheet" href="style/window.css">


</head>
<body>

    <!-- Left Panel: Grayscale Paint Editor -->
    <div class="panel" id="editor-panel">
        <div class="panel-header">Grayscale Editor</div>
        <div class="toolbar">
            <button id="brush-btn" class="active">Brush</button>
            <button id="eraser-btn">Eraser</button>
            <button id="clear-btn">Clear</button>
        </div>
        <div class="slider-group">
            <label>Brush:</label>
            <input type="range" id="brush-size" min="1" max="50" value="10">
            <span id="brush-size-val">10</span>px
        </div>
        <canvas id="grayscale-canvas"></canvas>
        <div class="info-text">Left click to paint | Right click to pick color</div>
    </div>

    <div class="resizer" id="resizer-1"></div>

    <!-- Middle Panel: 3D Viewer -->
    <div class="panel" id="viewer-panel">
        <div class="panel-header">3D Heightmap Viewer</div>
        <div class="toolbar">
            <button id="orbit-btn" class="active">Rotate</button>
            <button id="push-btn">Push</button>
            <button id="pull-btn">Pull</button>
            <button id="smooth-btn">Smooth</button>
        </div>
        <div class="slider-group">
            <label>Brush:</label>
            <input type="range" id="brush3d-size" min="0.1" max="2" step="0.1" value="0.5">
            <span id="brush3d-size-val">0.5</span>
        </div>
        <div class="slider-group">
            <label>Strength:</label>
            <input type="range" id="brush3d-strength" min="0.1" max="1" step="0.1" value="0.5">
            <span id="brush3d-strength-val">0.5</span>
        </div>
        <canvas id="three-canvas"></canvas>
        <div class="info-text">Drag to paint or rotate | Scroll to zoom</div>
    </div>

    <div class="resizer" id="resizer-2"></div>

    <!-- Right Panel: Normal Map Preview -->
    <div class="panel" id="preview-panel">
        <div class="panel-header">Normal Map Preview</div>
        <canvas id="normal-canvas"></canvas>
        <div class="info-text">Real-time normal map visualization</div>
    </div>

    <!-- We need this import map to be able to use the orbital controls, otherwise it complains it cant
        find the correct namespace -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- This script imports the submodules and sets up the scene. -->
    <!-- Note: i chose to write the code here and not in some submodule because of the CORS policy. 
        Otherwise, the user would have had to set up a local web server to bypass this policy. -->
    <script type="module">

        
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== SHARED STATE ====================

    const WIDTH = 128;
    const HEIGHT = 128;
    let heightmapData = new Uint8Array(WIDTH * HEIGHT);
    heightmapData.fill(128); // Start at middle gray

    // ==================== GRAYSCALE EDITOR ====================
    const gCanvas = document.getElementById('grayscale-canvas');
    const gCtx = gCanvas.getContext('2d');
    const brushSizeSlider = document.getElementById('brush-size');
    const brushSizeVal = document.getElementById('brush-size-val');
    const brushBtn = document.getElementById('brush-btn');
    const eraserBtn = document.getElementById('eraser-btn');
    const clearBtn = document.getElementById('clear-btn');

    let isBrush = true;
    let brushSize = 10;
    let isDrawing = false;
    let currentColor = 0;

    // Pan and zoom
    let panX = 0;
    let panY = 0;
    let zoom = 1;
    const minZoom = 0.25;
    const maxZoom = 8;

    function getCanvasCoords(clientX, clientY) {
        const rect = gCanvas.getBoundingClientRect();
        const x = (clientX - rect.left) / zoom - panX;
        const y = (clientY - rect.top) / zoom - panY;
        return { x, y };
    }

    function resizeGrayscaleCanvas() {
        const rect = document.getElementById('editor-panel').getBoundingClientRect();
        gCanvas.width = rect.width;
        gCanvas.height = rect.height - 110; // Account for toolbar
        redrawGrayscale();
    }

    function redrawGrayscale() {
        gCtx.fillStyle = '#1a1a1a';
        gCtx.fillRect(0, 0, gCanvas.width, gCanvas.height);

        // Create checkerboard for reference
        gCtx.fillStyle = '#0f0f0f';
        const gridSize = 10 * zoom;
        for (let x = panX; x < gCanvas.width / zoom + panX; x += 10) {
            for (let y = panY; y < gCanvas.height / zoom + panY; y += 10) {
                if ((Math.floor(x / 10) + Math.floor(y / 10)) % 2 === 0) {
                    gCtx.fillRect((x - panX) * zoom, (y - panY) * zoom, gridSize, gridSize);
            }
        }
    }

    // Draw heightmap as grayscale
    for (let y = 0; y < HEIGHT; y++) {
        for (let x = 0; x < WIDTH; x++) {
            const val = heightmapData[y * WIDTH + x];
            gCtx.fillStyle = `rgb(${val}, ${val}, ${val})`;
            const screenX = (x - panX) * zoom;
            const screenY = (y - panY) * zoom;
            gCtx.fillRect(screenX, screenY, zoom, zoom);
        }
    }

    // Draw grid lines
    gCtx.strokeStyle = '#222';
    gCtx.lineWidth = 1;
    for (let x = 0; x < WIDTH; x++) {
        const screenX = (x - panX) * zoom;
        gCtx.beginPath();
        gCtx.moveTo(screenX, 0);
        gCtx.lineTo(screenX, gCanvas.height);
        gCtx.stroke();
    }
    for (let y = 0; y < HEIGHT; y++) {
        const screenY = (y - panY) * zoom;
        gCtx.beginPath();
        gCtx.moveTo(0, screenY);
        gCtx.lineTo(gCanvas.width, screenY);
        gCtx.stroke();
    }
    }

    gCanvas.addEventListener('mousedown', (e) => {
        const { x, y } = getCanvasCoords(e.clientX, e.clientY);
        isDrawing = true;

        if (e.button === 2) {
        // Right click: pick color
            const px = Math.floor(x);
            const py = Math.floor(y);
            if (px >= 0 && px < WIDTH && py >= 0 && py < HEIGHT) {
                currentColor = heightmapData[py * WIDTH + px];
            }
        } else if (e.button === 0) {
            paintBrush(x, y);
        }
    });

    gCanvas.addEventListener('mousemove', (e) => {
        if (!isDrawing || e.buttons === 0) {
            isDrawing = false;
            return;
        }

        const { x, y } = getCanvasCoords(e.clientX, e.clientY);
        paintBrush(x, y);
    });

    gCanvas.addEventListener('mouseup', () => {
        isDrawing = false;
        updateAll();
    });

    gCanvas.addEventListener('contextmenu', (e) => e.preventDefault());

    gCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();

    const { x, y } = getCanvasCoords(e.clientX, e.clientY);

    const oldZoom = zoom;
    zoom *= e.deltaY > 0 ? 0.9 : 1.1;
    zoom = Math.max(minZoom, Math.min(maxZoom, zoom));

    // Adjust pan to zoom towards cursor
    panX = x - (x - panX) * (zoom / oldZoom);
    panY = y - (y - panY) * (zoom / oldZoom);

    // Clamp pan
    panX = Math.max(0, Math.min(WIDTH - gCanvas.width / zoom, panX));
    panY = Math.max(0, Math.min(HEIGHT - gCanvas.height / zoom, panY));

    redrawGrayscale();
    });

    // Pan with middle mouse button
    let panStartX = 0;
    let panStartY = 0;
    let isPanning = false;

    gCanvas.addEventListener('mousedown', (e) => {
        if (e.button === 1) { // Middle mouse button
            e.preventDefault();
            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            }
    });

    document.addEventListener('mousemove', (e) => {
    if (!isPanning) return;

    const deltaX = (e.clientX - panStartX) / zoom;
    const deltaY = (e.clientY - panStartY) / zoom;

    panX -= deltaX;
    panY -= deltaY;

    // Clamp pan
    panX = Math.max(0, Math.min(WIDTH - gCanvas.width / zoom, panX));
    panY = Math.max(0, Math.min(HEIGHT - gCanvas.height / zoom, panY));

    panStartX = e.clientX;
    panStartY = e.clientY;

    redrawGrayscale();
    });

    document.addEventListener('mouseup', (e) => {
        if (e.button === 1) {
            isPanning = false;
        }
    });

    function paintBrush(x, y) {
        const radius = brushSize;
        for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
                if (dx * dx + dy * dy > radius * radius) continue;

                const px = Math.floor(x + dx);
                const py = Math.floor(y + dy);

                if (px >= 0 && px < WIDTH && py >= 0 && py < HEIGHT) {
                    const idx = py * WIDTH + px;
                    if (isBrush) {
                        heightmapData[idx] = Math.min(255, heightmapData[idx] + 15);
                    } else {
                        heightmapData[idx] = Math.max(0, heightmapData[idx] - 15);
                    }
                }
            }
        }
        redrawGrayscale();
    }

    brushSizeSlider.addEventListener('change', (e) => {
        brushSize = parseInt(e.target.value);
        brushSizeVal.textContent = brushSize;
    });

    brushBtn.addEventListener('click', () => {
        isBrush = true;
        brushBtn.classList.add('active');
        eraserBtn.classList.remove('active');
    });

    eraserBtn.addEventListener('click', () => {
        isBrush = false;
        eraserBtn.classList.add('active');
        brushBtn.classList.remove('active');
    });

    clearBtn.addEventListener('click', () => {
        heightmapData.fill(128);
        redrawGrayscale();
        updateAll();
    });

    // ==================== 3D VIEWER ====================
    const threeCanvas = document.getElementById('three-canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    let camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    camera.position.set(0, 3, 3);

    let renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
    let controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    let mesh = null;
    let geometry = null;
    let material = null;

    // 3D Brush state
    let brushMode = 'orbit'; // 'orbit', 'push', 'pull', 'smooth'
    let brush3dSize = 0.5;
    let brush3dStrength = 0.5;
    const raycaster = new THREE.Raycaster();
    const mouse3d = new THREE.Vector2();

    const orbitBtn = document.getElementById('orbit-btn');
    const pushBtn = document.getElementById('push-btn');
    const pullBtn = document.getElementById('pull-btn');
    const smoothBtn = document.getElementById('smooth-btn');
    const brush3dSizeSlider = document.getElementById('brush3d-size');
    const brush3dSizeVal = document.getElementById('brush3d-size-val');
    const brush3dStrengthSlider = document.getElementById('brush3d-strength');
    const brush3dStrengthVal = document.getElementById('brush3d-strength-val');

    orbitBtn.addEventListener('click', () => {
    brushMode = 'orbit';
    controls.enabled = true;
    updateBrushButtons();
    });

    pushBtn.addEventListener('click', () => {
    brushMode = 'push';
    controls.enabled = false;
    updateBrushButtons();
    });

    pullBtn.addEventListener('click', () => {
    brushMode = 'pull';
    controls.enabled = false;
    updateBrushButtons();
    });

    smoothBtn.addEventListener('click', () => {
    brushMode = 'smooth';
    controls.enabled = false;
    updateBrushButtons();
    });

    function updateBrushButtons() {
    orbitBtn.classList.toggle('active', brushMode === 'orbit');
    pushBtn.classList.toggle('active', brushMode === 'push');
    pullBtn.classList.toggle('active', brushMode === 'pull');
    smoothBtn.classList.toggle('active', brushMode === 'smooth');
    }

    brush3dSizeSlider.addEventListener('change', (e) => {
    brush3dSize = parseFloat(e.target.value);
    brush3dSizeVal.textContent = brush3dSize.toFixed(1);
    });

    brush3dStrengthSlider.addEventListener('change', (e) => {
    brush3dStrength = parseFloat(e.target.value);
    brush3dStrengthVal.textContent = brush3dStrength.toFixed(1);
    });

    threeCanvas.addEventListener('mousemove', (e) => {
    if (brushMode === 'orbit') return;

    const rect = threeCanvas.getBoundingClientRect();
    mouse3d.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse3d.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    });

    threeCanvas.addEventListener('mousedown', (e) => {
    if (brushMode === 'orbit') return;
    e.preventDefault();

    const rect = threeCanvas.getBoundingClientRect();
    mouse3d.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse3d.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    let isDrawing = true;

    const paintFn = () => {
    if (!isDrawing) return;

    raycaster.setFromCamera(mouse3d, camera);
    const intersects = raycaster.intersectObject(mesh);

    if (intersects.length > 0) {
    const point = intersects[0].point;
    applyBrush(point.x, point.y, brushMode);
    create3DMesh();
    updateNormalMap();
    }

    requestAnimationFrame(paintFn);
    };

    const moveFn = (e) => {
    const rect = threeCanvas.getBoundingClientRect();
    mouse3d.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse3d.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    };

    const endFn = () => {
    isDrawing = false;
    document.removeEventListener('mousemove', moveFn);
    document.removeEventListener('mouseup', endFn);
    redrawGrayscale();
    };

    paintFn();
    document.addEventListener('mousemove', moveFn);
    document.addEventListener('mouseup', endFn);
    });

    function applyBrush(x, y, mode) {
    const brushRadius = brush3dSize * 2;

    for (let dy = -brushRadius; dy <= brushRadius; dy += 0.1) {
    for (let dx = -brushRadius; dx <= brushRadius; dx += 0.1) {
    if (dx * dx + dy * dy > brushRadius * brushRadius) continue;

    const hx = Math.floor((x / 4 + 0.5) * (WIDTH - 1) + dx);
    const hy = Math.floor((y / 4 + 0.5) * (HEIGHT - 1) + dy);

    if (hx >= 0 && hx < WIDTH && hy >= 0 && hy < HEIGHT) {
    const idx = hy * WIDTH + hx;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const falloff = Math.max(0, 1 - dist / brushRadius);

    if (mode === 'push') {
    heightmapData[idx] = Math.max(0, heightmapData[idx] - falloff * brush3dStrength * 25);
    } else if (mode === 'pull') {
    heightmapData[idx] = Math.min(255, heightmapData[idx] + falloff * brush3dStrength * 25);
    } else if (mode === 'smooth') {
    // Simple smoothing: average with neighbors
    let sum = heightmapData[idx];
    let count = 1;
    for (let ny = -1; ny <= 1; ny++) {
    for (let nx = -1; nx <= 1; nx++) {
    if (nx === 0 && ny === 0) continue;
    const ni = (hy + ny) * WIDTH + (hx + nx);
    if (hx + nx >= 0 && hx + nx < WIDTH && hy + ny >= 0 && hy + ny < HEIGHT) {
    sum += heightmapData[ni];
    count++;
    }
    }
    }
    const avg = sum / count;
    heightmapData[idx] = Math.round(heightmapData[idx] * (1 - falloff * brush3dStrength * 0.3) + avg * falloff * brush3dStrength * 0.3);
    }
    }
    }
    }
    }

    function create3DMesh() {
    // Remove old mesh
    if (mesh) scene.remove(mesh);
    if (geometry) geometry.dispose();
    if (material) material.dispose();

    // Create new geometry from heightmap
    geometry = new THREE.PlaneGeometry(4, 4, WIDTH - 1, HEIGHT - 1);
    const pos = geometry.attributes.position;

    for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);

    // Map to heightmap coordinates
    const hx = Math.floor((x / 4 + 0.5) * (WIDTH - 1));
    const hy = Math.floor((y / 4 + 0.5) * (HEIGHT - 1));
    const idx = hy * WIDTH + hx;

    const z = ((heightmapData[idx] || 128) / 255.0 - 0.5) * 2;
    pos.setZ(i, z);
    }

    pos.needsUpdate = true;
    geometry.computeVertexNormals();

    material = new THREE.MeshStandardMaterial({
    color: 0xaaaaaa,
    metalness: 0.2,
    roughness: 0.8,
    side: THREE.DoubleSide
    });

    mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    }

    function resizeThreeCanvas() {
    const rect = document.getElementById('viewer-panel').getBoundingClientRect();
    const width = rect.width;
    const height = rect.height - 30; // Account for header

    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
    }

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5, 10, 5);
    scene.add(light);

    function animate3D() {
    requestAnimationFrame(animate3D);
    controls.update();
    renderer.render(scene, camera);
    }



    // ==================== NORMAL MAP PREVIEW ====================

    const normCanvas = document.getElementById('normal-canvas');
    const normCtx = normCanvas.getContext('2d');

    function resizeNormalCanvas() {
    const rect = document.getElementById('preview-panel').getBoundingClientRect();
    normCanvas.width = rect.width;
    normCanvas.height = rect.height - 30;
    updateNormalMap();
    }

    function updateNormalMap() {
    const imgData = normCtx.createImageData(WIDTH, HEIGHT);

    for (let y = 0; y < HEIGHT; y++) {
    for (let x = 0; x < WIDTH; x++) {
    const idx = y * WIDTH + x;

    // Simple normal calculation from heightmap
    const h0 = heightmapData[idx];
    const hx = x < WIDTH - 1 ? heightmapData[y * WIDTH + x + 1] : h0;
    const hy = y < HEIGHT - 1 ? heightmapData[(y + 1) * WIDTH + x] : h0;

    const dx = (hx - h0) / 255.0;
    const dy = (hy - h0) / 255.0;

    // Simple normal from height gradient
    let nx = -dx;
    let ny = -dy;
    let nz = 0.5;

    const len = Math.sqrt(nx * nx + ny * ny + nz * nz);
    nx /= len;
    ny /= len;
    nz /= len;

    // Convert to RGB
    imgData.data[idx * 4 + 0] = Math.floor((nx + 1) * 127.5);
    imgData.data[idx * 4 + 1] = Math.floor((ny + 1) * 127.5);
    imgData.data[idx * 4 + 2] = Math.floor((nz + 1) * 127.5);
    imgData.data[idx * 4 + 3] = 255;
    }
    }

    // Scale up to canvas
    const scaleX = normCanvas.width / WIDTH;
    const scaleY = normCanvas.height / HEIGHT;
    const scaledData = normCtx.createImageData(normCanvas.width, normCanvas.height);

    for (let y = 0; y < normCanvas.height; y++) {
    for (let x = 0; x < normCanvas.width; x++) {
    const sx = Math.floor(x / scaleX);
    const sy = Math.floor(y / scaleY);
    const sIdx = (sy * WIDTH + sx) * 4;
    const dIdx = (y * normCanvas.width + x) * 4;

    scaledData.data[dIdx + 0] = imgData.data[sIdx + 0];
    scaledData.data[dIdx + 1] = imgData.data[sIdx + 1];
    scaledData.data[dIdx + 2] = imgData.data[sIdx + 2];
    scaledData.data[dIdx + 3] = 255;
    }
    }

    normCtx.putImageData(scaledData, 0, 0);
    }

    // ==================== LAYOUT & RESIZE ====================
    function updateAll() {
    create3DMesh();
    updateNormalMap();
    }

    function setupResizers() {
    const resizer1 = document.getElementById('resizer-1');
    const resizer2 = document.getElementById('resizer-2');
    const editorPanel = document.getElementById('editor-panel');
    const viewerPanel = document.getElementById('viewer-panel');
    const previewPanel = document.getElementById('preview-panel');

    function startResize(e, resizerNum) {
    e.preventDefault();
    const startX = e.clientX;
    const startEditorWidth = editorPanel.offsetWidth;
    const startViewerWidth = viewerPanel.offsetWidth;
    const startPreviewWidth = previewPanel.offsetWidth;

    document.body.style.cursor = 'col-resize';

    const moveFn = (e) => {
    const delta = e.clientX - startX;

    if (resizerNum === 1) {
    const newEditorWidth = Math.max(200, startEditorWidth + delta);
    const newViewerWidth = Math.max(200, startViewerWidth - delta);
    editorPanel.style.flex = `0 0 ${newEditorWidth}px`;
    viewerPanel.style.flex = `0 0 ${newViewerWidth}px`;
    } else if (resizerNum === 2) {
    const newViewerWidth = Math.max(200, startViewerWidth + delta);
    const newPreviewWidth = Math.max(200, startPreviewWidth - delta);
    viewerPanel.style.flex = `0 0 ${newViewerWidth}px`;
    previewPanel.style.flex = `0 0 ${newPreviewWidth}px`;
    }
    };

    const endResize = () => {
    document.removeEventListener('mousemove', moveFn);
    document.removeEventListener('mouseup', endResize);
    document.body.style.cursor = 'default';
    resizeGrayscaleCanvas();
    resizeThreeCanvas();
    resizeNormalCanvas();
    };

    document.addEventListener('mousemove', moveFn);
    document.addEventListener('mouseup', endResize);
    }

    resizer1.addEventListener('mousedown', (e) => startResize(e, 1));
    resizer2.addEventListener('mousedown', (e) => startResize(e, 2));
    }

    // -------------------| Global Initialization |-------------------
        
    setupResizers();

    // Resize all canvas to fit the initial screen/page dimension
    resizeGrayscaleCanvas();
    resizeThreeCanvas();
    resizeNormalCanvas();

    create3DMesh();
    animate3D();

        
    window.addEventListener('resize', () => {
        resizeGrayscaleCanvas();
        resizeThreeCanvas();
        resizeNormalCanvas();
    });

    // Global functions for external updates, overwrites the current data
    window.updateHeightmap = (data) => {
        heightmapData = new Uint8Array(data);
        updateAll();
    };

    // A simple getter
    window.getHeightmapData = () => heightmapData;

    // Downloads locally the heightmap data as a json
    window.saveHeightmap = () => {
        const json = JSON.stringify(Array.from(heightmapData));
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'heightmap.json';
        a.click();
    };

    </script>

</body>
</html>
